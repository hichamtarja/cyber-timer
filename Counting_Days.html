<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Days Counter</title>

<style>
    body {
        margin: 0;
        background: #0a0f1a;
        color: #00ffcc;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }

    .container {
        text-align: center;
    }

    .title {
        font-size: 14px;
        color: #888;
        margin-bottom: 15px;
    }

    #counter {
        font-size: 60px;
        margin-bottom: 20px;
        text-shadow: 0 0 10px #00ffcc;
    }

    .buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
    }

    button {
        background: #111;
        border: 1px solid #00ffcc;
        color: #00ffcc;
        font-size: 18px;
        padding: 10px 15px;
        cursor: pointer;
        font-family: "Courier New", monospace;
    }

    button:hover {
        background: #00ffcc;
        color: #000;
    }
</style>
</head>

<body>

<div class="container">
    <div class="title">DAY COUNTER</div>

    <div id="counter">0</div>

    <div class="buttons">
        <button onclick="decrease()">⬅</button>
        <button onclick="increase()">➡</button>
        <button onclick="reset()">RESET</button>
    </div>
</div>

<script>
let days = 0;

// Load saved value
const savedDays = localStorage.getItem("daysCounter");
if (savedDays !== null) {
    days = parseInt(savedDays);
}

function updateDisplay() {
    document.getElementById("counter").innerText = days;
    localStorage.setItem("daysCounter", days);
}

function increase() {
    days++;
    updateDisplay();
}

function decrease() {
    if (days > 0) {
        days--;
        updateDisplay();
    }
}

function reset() {
    days = 0;
    updateDisplay();
}

// Initialize
updateDisplay();
</script>

</body>
</html>
