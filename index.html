<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cybersecurity Countdown</title>

<style>
    body {
        margin: 0;
        background: #0a0f1a;
        color: #00ffcc;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }

    .container {
        text-align: center;
    }

    .title {
        font-size: 14px;
        color: #888;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    #datePicker {
        margin-bottom: 10px;
        background: #111;
        color: #00ffcc;
        border: 1px solid #00ffcc;
        padding: 5px;
        font-family: "Courier New", monospace;
    }

    #timer {
        font-size: 48px;
        font-weight: bold;
        text-shadow: 0 0 10px #00ffcc;
    }

    .quote {
        margin-top: 15px;
        font-size: 14px;
        color: #aaa;
    }

    .status {
        margin-top: 20px;
        font-size: 12px;
        color: #555;
    }
</style>
</head>

<body>

<div class="container">
    <div class="title">TARGET: JUNIOR CYBERSECURITY ANALYST</div>

    <input type="datetime-local" id="datePicker">

    <div id="timer">SET YOUR TARGET DATE</div>

    <div class="quote">
        Every second you waste is a vulnerability in your future.
    </div>

    <div class="status" id="status"></div>
</div>

<script>
let targetDate = null;

const datePicker = document.getElementById("datePicker");

// Load saved date
const savedDate = localStorage.getItem("targetDate");
if (savedDate) {
    targetDate = new Date(savedDate);
    datePicker.value = savedDate;
}

// When user selects a date
datePicker.addEventListener("change", function () {
    targetDate = new Date(this.value);
    localStorage.setItem("targetDate", this.value);
});

function updateTimer() {
    if (!targetDate) {
        document.getElementById("timer").innerText = "SET YOUR TARGET DATE";
        document.getElementById("status").innerText = "";
        return;
    }

    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
        document.getElementById("timer").innerText = "TARGET REACHED";
        document.getElementById("status").innerText = "You made it.";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerText =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;

    document.getElementById("status").innerText =
        "System running... Progress required.";
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
