<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cybersecurity Countdown</title>

<style>
    body {
        margin: 0;
        background: #0a0f1a;
        color: #00ffcc;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }

    .container {
        text-align: center;
    }

    .title {
        font-size: 14px;
        color: #888;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    #timer {
        font-size: 48px;
        font-weight: bold;
        text-shadow: 0 0 10px #00ffcc;
    }

    .quote {
        margin-top: 15px;
        font-size: 14px;
        color: #aaa;
    }

    .status {
        margin-top: 20px;
        font-size: 12px;
        color: #555;
    }
</style>
</head>

<body>

<div class="container">
    <div class="title">TARGET: JUNIOR CYBERSECURITY ANALYST</div>
    <div id="timer">Loading...</div>
    <div class="quote">Every second you waste is a vulnerability in your future.</div>
    <div class="status" id="status"></div>
</div>

<script>
const targetDate = new Date("2026-12-31 23:59:59");

function updateTimer() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
        document.getElementById("timer").innerText = "TARGET REACHED";
        document.getElementById("status").innerText = "You made it.";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("timer").innerText =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;

    document.getElementById("status").innerText =
        "System running... Progress required.";
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
